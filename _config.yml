title: "RF-Quiet Power Supply for QRP Labs QMX | M9OMS"
description: >-
  RF-quiet very low dropout (VLDO) linear voltage regulator for QRP Labs QMX and other QRP radios.
  Selectable 9.0, 12.0 or 13.8 V output up to 2 A. Hardware design by M9OMS with comprehensive measurements and characterisation.

url: "https://radio-uncensored.github.io"
baseurl: "/qrp-vldo-regulator"

theme: jekyll-theme-cayman
show_downloads: false

plugins:
  - jekyll-seo-tag      # emits <title>, <meta description>, Open Graph / Twitter cards
  - jekyll-sitemap      # auto-generates /sitemap.xml for crawlers
  # jekyll-relative-links is enabled by GitHub Pages by default, so existing
  # [text](measurements.md) links resolve to the correct .html URLs automatically.

exclude:
  - "*.kicad_*"
  - "*.gbr"
  - "*.drl"
